<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="JobCrawler - Find hidden jobs from multiple sources instantly"
    />
    <title>JobCrawler</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="header-top">
        <h1>JobCrawler</h1>

        <button id="themeToggle">🌙</button>
      </div>

      <p>Find hidden jobs from multiple sources instantly</p>
    </header>

    <section class="search-container">
      <input
        id="jobInput"
        type="text"
        placeholder="Search job title (e.g. Frontend Developer in Nigeria)"
      />

      <button id="searchBtn">Search</button>
    </section>

    <section id="results" class="results">
      <div class="empty">Search for jobs to begin</div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
